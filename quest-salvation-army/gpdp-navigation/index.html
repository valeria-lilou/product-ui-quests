<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="style.css" type="text/css" rel="stylesheet"/>
    <link href='https://googleapis.com' rel='stylesheet'>
</head>
<body>
    <!--main-header-->
    <div class="main-header">
        <div class="header-txt">Home</div> 
    </div>

    <!--main-navigation-->
    <div class="nav-box">
        <div class="nav-container">
            <!--ICON IMGS-->
            <div class="nav-icons">
            <!--Home Icon-->
            <img class="home-icon" width="50" height="50" src="https://img.icons8.com/material-rounded/256/FAFAFA/home.png" alt="home"/>
            <!--Messages Icon-->
            <div class="mssg-icon">
                <img width="50" height="50" src="https://img.icons8.com/sf-regular-filled/256/FAFAFA/chat-message.png" alt="chat-message"/>
                <img class="notification-dot" width="35" height="35" src="https://img.icons8.com/ios-filled/100/C22A3A/full-stop.png" alt="full-stop"/>
            </div>
            
            <!--Schedule Icon-->
            <img class="calendar-icon" width="45" height="45" src="https://img.icons8.com/ios-filled/100/FAFAFA/calendar--v1.png" alt="calendar--v1"/>
            <!--Profile Icon-->
            <img class="profile-icon" width="50" height="50" src="https://img.icons8.com/tiny-glyph/256/FAFAFA/gender-neutral-user.png" alt="gender-neutral-user"/>
            </div>

            <!--ICON CHECK IN-->
            <div class="bttn-check-in">
            <img class="background-blue" width="200" height="200" src="https://img.icons8.com/ios-filled/500/244A6B/full-stop.png" alt="full-stop"/>
            <img class="background-red" width="175" height="175" src="https://img.icons8.com/ios-filled/500/c22a3a/full-stop.png" alt="full-stop"/>
            <img class="barcode-icon" width="50" height="50" src="https://img.icons8.com/pastel-glyph/512/FAFAFA/barcode.png" alt="barcode"/>
            <div class="label-check-in">Check-In</div>
        </div>
            <!--ICON TEXT LABEL-->
            <div class="icon-labels">
            <div class="label-home">Home</div>
            <div class="label-mssgs">Messages</div>
            <div class="label-schedule">Schedule</div>
            <div class="label-profile">Profile</div>
            </div>
            
        </div>
        
    </div>
</body>
</html>
